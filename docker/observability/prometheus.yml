global:
  scrape_interval: 15s

scrape_configs:
  - job_name: secondbrain-app
    metrics_path: /metrics
    static_configs:
      # `app` is the API service from docker-compose.yml (same merged network).
      - targets: ["app:3000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
